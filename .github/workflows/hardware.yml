name: Hardware CI

on:
  push:
    paths:
      - "hardware/**"
  pull_request:
    paths:
      - "hardware/**"

jobs:
  # ─── Job 1: compila el firmware real para ESP32 ───────────────────────────
  build-firmware:
    name: Build ESP32 Firmware
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache de toolchain y paquetes de PlatformIO (~500MB, tarda mucho la 1ra vez)
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('hardware/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install platformio

      # Secrets.h no se commitea — en CI usamos el ejemplo que compila sin errores
      - name: Create Secrets.h for CI
        run: cp hardware/src/Secrets.example.h hardware/src/Secrets.h

      - name: Build firmware (esp32cam)
        run: pio run -e esp32cam
        working-directory: hardware

  # ─── Job 2: unit tests nativos (sin hardware) ────────────────────────────
  test-native:
    name: Native Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-native-${{ runner.os }}-${{ hashFiles('hardware/platformio.ini') }}
          restore-keys: pio-native-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run native unit tests
        run: pio test -e native -v
        working-directory: hardware
