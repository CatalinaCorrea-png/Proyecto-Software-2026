services:
  mongodb:
    image: mongo:7.0
    container_name: aerosearch-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: aerosearch
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: fast-api-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - ENV=production
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB=aerosearch

  frontend:
    build: ./frontend
    container_name: react-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data: